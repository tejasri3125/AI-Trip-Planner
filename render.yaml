services:
  - type: web
    name: tripplanner-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # You'll fill this in the Render dashboard
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random string
      - key: DATABASE_URL
        value: sqlite:///./tripplanner.db
